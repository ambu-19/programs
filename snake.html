<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Realistic Snake in Water</title>
<style>
  body {
    margin: 0;
    background: radial-gradient(#002244, #000814);
    overflow: hidden;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let t = 0;

/* ---------------- WATER BUBBLES ---------------- */
let bubbles = [];
for (let i = 0; i < 70; i++) {
  bubbles.push({
    x: Math.random() * canvas.width,
    y: canvas.height + Math.random() * canvas.height,
    r: Math.random() * 3 + 1,
    s: Math.random() * 0.6 + 0.4
  });
}

function drawBubbles() {
  ctx.fillStyle = "rgba(200,220,255,0.6)";
  bubbles.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    b.y -= b.s;
    if (b.y < -10) {
      b.y = canvas.height + 10;
      b.x = Math.random() * canvas.width;
    }
  });
}

/* ---------------- WATER DISTORTION ---------------- */
function waterDistortion(y) {
  return Math.sin(y * 0.03 + t * 2) * 4;
}

/* ---------------- SNAKE BODY ---------------- */
function drawSnake() {
  let cx = canvas.width / 2;
  let cy = canvas.height / 2;

  let headX = 0, headY = 0, headR = 0;

  for (let y = -4; y <= 4; y += 0.08) {

    let x = 0.6 * Math.sin(y + t);
    let z = 0.45 * Math.cos(2*y + t);

    let body = Math.max((-Math.abs(y) + 4), 0);

    let depth = 1 / (1 + z * 0.6);
    let px = cx + x * 160 * depth + waterDistortion(y*40);
    let py = cy + y * 26 * depth;

    let radius = body * 6 * depth;

    // Save head position
    if (y > 3.7) {
      headX = px;
      headY = py;
      headR = radius;
    }

    // Yellow & black bands
    let band = Math.sin(5*y + t*1.8);
    ctx.fillStyle = band > 0 ? "rgb(255,215,0)" : "black";

    ctx.beginPath();
    ctx.arc(px, py, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  drawHead(headX, headY, headR);
}

/* ---------------- SNAKE HEAD ---------------- */
function drawHead(x, y, r) {
  ctx.fillStyle = "rgb(255,215,0)";
  ctx.beginPath();
  ctx.arc(x, y, r * 1.3, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = "black";
  ctx.beginPath();
  ctx.arc(x + r * 0.4, y - r * 0.3, r * 0.15, 0, Math.PI * 2);
  ctx.arc(x + r * 0.4, y + r * 0.3, r * 0.15, 0, Math.PI * 2);
  ctx.fill();

  // Tongue flick
  let flick = Math.sin(t * 8) * r * 0.8;
  ctx.strokeStyle = "red";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x + r * 1.2, y);
  ctx.lineTo(x + r * 1.8 + flick, y);
  ctx.stroke();
}

/* ---------------- ANIMATION ---------------- */
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBubbles();
  drawSnake();

  t += 0.045; // increased speed
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
