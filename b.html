<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bird Flight using y = |x|sin(|x|-t)</title>
<style>
  body {
    background: #0b1d2a;
    margin: 0;
    overflow: hidden;
  }
  canvas {
    display: block;
    margin: auto;
  }
</style>
</head>
<body>

<canvas id="canvas" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let t = 0;

function drawBird() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 2);

  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;

  // LEFT WING
  ctx.beginPath();
  for (let x = -2; x <= 0; x += 0.01) {
    let y = Math.abs(x) * Math.sin(Math.abs(x) - t);
    ctx.lineTo(x * 80, -y * 80);
  }
  ctx.stroke();

  // RIGHT WING (mirror)
  ctx.beginPath();
  for (let x = 0; x <= 2; x += 0.01) {
    let y = Math.abs(x) * Math.sin(Math.abs(x) - t);
    ctx.lineTo(x * 80, -y * 80);
  }
  ctx.stroke();

  // BIRD BODY (small circle)
  ctx.beginPath();
  ctx.arc(0, 0, 5, 0, Math.PI * 2);
  ctx.fillStyle = "orange";
  ctx.fill();

  ctx.restore();

  t += 0.08; // flapping speed
  requestAnimationFrame(drawBird);
}

drawBird();
</script>

</body>
</html>
